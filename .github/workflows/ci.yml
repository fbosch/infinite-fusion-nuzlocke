name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run daily at 2 AM UTC to refresh data
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        env:
          VITEST_BROWSER: 'true'
        run: pnpm run test:run

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type-check
        run: pnpm run type-check

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full validation
        run: pnpm run validate

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    needs: [test, type-check, code-quality]
    if: always()

    steps:
      - name: Enforce required checks
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test Suite must pass before release gating"
            exit 1
          fi

          if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "Code Quality must pass before release gating"
            exit 1
          fi

          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "Type Check must pass before release gating"
            exit 1
          fi

          echo "Required release checks passed"

  data-refresh:
    name: Data Download & Validation
    runs-on: ubuntu-latest
    needs: [test, type-check, code-quality]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download fresh Pokemon data
        run: |
          pnpm run scrape

      - name: Run data integrity tests on fresh data
        run: |
          echo "🧪 Validating data integrity..."
          pnpm vitest run tests/data-integrity.test.ts

      - name: Display data summary
        run: |
          echo "📊 Data Summary:"
          echo "Pokemon data files:"
          find data -name "*.json" -type f | sort
          echo ""
          echo "File sizes:"
          find data -name "*.json" -type f -exec du -h {} \;

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-data
          path: |
            data/**/*.json
          retention-days: 30

      - name: Check for data changes
        id: data-changes
        run: |
          if [[ -n $(git status --porcelain data/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Data files have been updated"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to data files"
          fi

      - name: Generate data update PR body
        if: steps.data-changes.outputs.changes == 'true' && github.event_name == 'schedule'
        run: pnpm run data:pr-body -- "$RUNNER_TEMP/data-refresh-pr-body.md"

      - name: Create Pull Request with updated data
        if: steps.data-changes.outputs.changes == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Pokemon data files'
          title: '🤖 Auto-update Pokemon data'
          body-path: ${{ runner.temp }}/data-refresh-pr-body.md
          branch: auto-update-data
          delete-branch: true
